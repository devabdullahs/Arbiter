name: Build & push deploy images

# Builds the bot and web images and pushes them to GitHub Container Registry.
# Image names are derived from the repo name, so this same workflow produces
# ghcr.io/<owner>/arbiter-bot|web in the public repo and
# ghcr.io/<owner>/arbiter-pro-bot|web in the private fork — no divergence.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "deploy/ugreenas/**"
      - ".github/workflows/deploy-images.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - suffix: bot
            dockerfile: deploy/ugreenas/bot.Dockerfile
          - suffix: web
            dockerfile: deploy/ugreenas/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name
        id: meta
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY##*/}"
          echo "image=ghcr.io/${owner}/${repo,,}-${{ matrix.image.suffix }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.suffix }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.suffix }}
