name: Build & push deploy images

# Builds the bot and web images and pushes them to GitHub Container Registry
# (ghcr.io/<owner>/arbiter-bot and .../arbiter-web). The UGREEN NAS then just
# pulls them — no local building or tarball juggling.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "deploy/ugreenas/**"
      - ".github/workflows/deploy-images.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: arbiter-bot
            dockerfile: deploy/ugreenas/bot.Dockerfile
          - name: arbiter-web
            dockerfile: deploy/ugreenas/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Resolve lowercase owner
        id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image.name }}:latest
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
