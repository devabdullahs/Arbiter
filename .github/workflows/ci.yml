name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & test
    runs-on: ubuntu-latest
    env:
      # Prisma reads DATABASE_URL from the schema datasource. `prisma generate`
      # does not connect to the database, but a value avoids env-var warnings.
      DATABASE_URL: postgresql://user:pass@localhost:5432/ci?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Syntax check & tests
        run: npm run check
