name: Bug report
description: Report a problem with the bot
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run /...
        2. ...
        3. See error
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command / interaction involved
      placeholder: "/match-admin create"
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant logs or screenshots. NEVER include your bot token or other secrets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Bot version / commit
      placeholder: "commit hash or v0.1.0"
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I removed any tokens/secrets from logs and screenshots
          required: true
        - label: I searched existing issues for duplicates
          required: true
